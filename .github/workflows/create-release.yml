name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: CI=1 pnpm install --frozen-lockfile

      - name: Verify current main branch
        run: pnpm lint && pnpm build && CI=1 pnpm build-storybook

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          npm version "${{ inputs.release_type }}" -m "Release v%s"
          echo "RELEASE_TAG=$(git describe --tags --abbrev=0)" >> "$GITHUB_ENV"

      - name: Push commit and tag
        run: git push origin main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG"
