name: Publish Package

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: CI=1 pnpm install --frozen-lockfile

      - name: Verify current main branch
        run: |
          pnpm lint
          pnpm build
          CI=1 pnpm build-storybook

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          npm version "${{ inputs.release_type }}" -m "Release v%s"
          echo "PACKAGE_NAME=$(node -p \"require('./package.json').name\")" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$(node -p \"require('./package.json').version\")" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$(git describe --tags --abbrev=0)" >> "$GITHUB_ENV"

      - name: Ensure npm version is unpublished
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm."
            echo "Choose a new release type or bump to a different version."
            exit 1
          fi

      - name: Rebuild released version
        run: |
          pnpm build
          CI=1 pnpm build-storybook

      - name: Push commit and tag
        run: git push origin main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG"

      - name: Publish to npm
        run: npm publish --provenance --access public
