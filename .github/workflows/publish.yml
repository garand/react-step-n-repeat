name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag version ($RELEASE_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            echo "Bump package.json first, push it, then create a matching GitHub release tag."
            exit 1
          fi

      - name: Ensure npm version is unpublished
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm."
            echo "Bump package.json to a new version before creating another release."
            exit 1
          fi

      - name: Verify package
        run: pnpm lint && pnpm build && CI=1 pnpm build-storybook

      - name: Publish to npm
        run: npm publish --provenance --access public
